openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: RandomChat Indonesia API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: chat
    description: Chat operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /chat/stats:
    get:
      operationId: getChatStats
      tags: [chat]
      summary: Get chat statistics
      description: Returns active users and chat pairs count
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatStats"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ChatStats:
      type: object
      properties:
        activeUsers:
          type: integer
        activePairs:
          type: integer
        waitingUsers:
          type: integer
      required:
        - activeUsers
        - activePairs
        - waitingUsers
